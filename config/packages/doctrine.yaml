doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        # server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'
        types:
            aggregate_root_id: App\Shared\Infrastructure\Persistence\Doctrine\Type\AggregateRootIdType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            EntityTypeXML:
                type: xml
                dir: '%kernel.project_dir%/src/IngredientType/Infrastructure/DoctrineMapping'
                prefix: 'App\IngredientType\Domain\Model'
                alias: IngredientType
                is_bundle: false
            SeasonXML:
                type: xml
                dir: '%kernel.project_dir%/src/Season/Infrastructure/DoctrineMapping'
                prefix: 'App\Season\Domain\Model'
                alias: Season
                is_bundle: false
            UnitOfMeasureXML:
                type: xml
                dir: '%kernel.project_dir%/src/UnitOfMeasure/Infrastructure/DoctrineMapping'
                prefix: 'App\UnitOfMeasure\Domain\Model'
                alias: UnitOfMeasure
                is_bundle: false
            IngredientXML:
                type: xml
                dir: '%kernel.project_dir%/src/Ingredient/Infrastructure/DoctrineMapping'
                prefix: 'App\Ingredient\Domain\Model'
                alias: Ingredient
                is_bundle: false
when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
